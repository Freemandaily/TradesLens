name: dex_indexer_final
rollback_on_reorg: true
unordered_multichain_mode: true
preload_handlers: true
address_format: lowercase
raw_events: false
save_full_history: false
contracts:
  - name: UniswapV3Factory
    handler: src/handlers/factory.ts
    events:
      - event: PoolCreated(address indexed token0, address indexed token1, uint24
          indexed fee, int24 tickSpacing, address pool)
  - name: UniswapV3Pool
    handler: src/handlers/pool.ts
    events:
      - event: Initialize(uint160 sqrtPriceX96, int24 tick)
      - event: Swap(address indexed sender, address indexed recipient, int256 amount0,
          int256 amount1, uint160 sqrtPriceX96, uint128 liquidity, int24 tick)
        field_selection:
          transaction_fields:
            - hash
            - gasPrice
            - from
            - to
