services:
  backend:
    build:
      context: ./backend
    container_name: dex_backend
    ports:
      - "8001:8001"
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - dex_network
      - local_test_network

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - dex_network

networks:
  dex_network:
    driver: bridge
  local_test_network:
    external: true
