version: "3.8"

services:
  backend:
    build:
      context: ./backend
    container_name: dex_backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    networks:
      - dex_network

  frontend:
    build:
      context: ./frontend
    container_name: dex_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dex_network

networks:
  dex_network:
    driver: bridge
