version: 2

sources:
  - name: dexSwap_v3
    schema: envio
    database: tsdb
    description: "Raw Uniswap V3 data ingested by Envio HyperIndex"

    tables:
      - name: Pool
        identifier: Pool
        description: "Uniswap V3 pools with embedded token metadata"
        columns:
          - name: id
            description: "Unique pool identifier (chainId-poolAddress)"
            data_type: text
            data_tests:
              - not_null
              - unique

          - name: token0
            description: "Address of token0"
            data_type: text
            data_tests:
              - not_null

          - name: token0_symbol
            description: "Symbol of token0 e.g USDC, WETH"
            data_type: text
            data_tests:
              - not_null

          - name: token0_name
            description: "Full name of token0 e.g USD Coin"
            data_type: text
            data_tests:
              - not_null

          - name: token0_decimals
            description: "Decimal places for token0"
            data_type: integer
            data_tests:
              - not_null

          - name: token1
            description: "Address of token1"
            data_type: text
            data_tests:
              - not_null

          - name: token1_symbol
            description: "Symbol of token1"
            data_type: text
            data_tests:
              - not_null

          - name: token1_name
            description: "Full name of token1"
            data_type: text
            data_tests:
              - not_null

          - name: token1_decimals
            description: "Decimal places for token1"
            data_type: integer
            data_tests:
              - not_null

          - name: fee
            description: "Fee tier of the pool (500, 3000, 10000)"
            data_type: integer
            data_tests:
              - not_null
              - accepted_values:
                  values: [1, 100, 500, 3000, 10000]

          - name: createdAt
            quote: true
            description: "Block timestamp when pool was created"
            data_type: numeric
            data_tests:
              - not_null

      - name: Swap
        identifier: Swap
        description: "Swap events from Uniswap V3 pools"
        columns:
          - name: id
            description: "Unique swap identifier (txHash-logIndex)"
            data_type: text
            data_tests:
              - not_null
              - unique

          - name: dex
            description: "DEX identifier e.g uniswap-v3"
            data_type: text
            data_tests:
              - not_null

          - name: pool_id
            description: "Foreign key to Pool table"
            data_type: text
            data_tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('dexSwap_v3', 'Pool')
                    field: id

          - name: sender
            description: "Address that initiated the swap"
            data_type: text
            data_tests:
              - not_null

          - name: recipient
            description: "Address that received the swap output"
            data_type: text
            data_tests:
              - not_null

          - name: amount0
            description: "Amount of token0 (can be negative, raw BigInt)"
            data_type: numeric
            data_tests:
              - not_null

          - name: amount1
            description: "Amount of token1 (can be negative, raw BigInt)"
            data_type: numeric
            data_tests:
              - not_null

          - name: sqrtPriceX96
            quote: true
            description: "Square root price after swap in Q64.96 format"
            data_type: numeric
            data_tests:
              - not_null

          - name: tick
            description: "Current tick after the swap"
            data_type: integer
            data_tests:
              - not_null

          - name: txHash
            quote: true
            description: "Transaction hash of the swap"
            data_type: text
            data_tests:
              - not_null

          - name: blockNumber
            quote: true
            description: "Block number the swap was included in"
            data_type: numeric
            data_tests:
              - not_null

          - name: timestamp
            description: "Block timestamp of the swap"
            data_type: numeric
            data_tests:
              - not_null
