version: 2

sources:
  - name: dexSwap_v3
    schema: envio_v2
    database: tsdb
    description: "Raw DEX V3 data ingested by Envio HyperIndex"

    tables:
      - name: Swap
        identifier: Swap
        description: "Swap events from DEX V3 pools"
        columns:
          - name: id
            description: "Unique swap identifier (txHash-logIndex)"
            data_type: text
            data_tests:
              - not_null
              - unique

          - name: dex
            description: "DEX identifier e.g uniswap-v3"
            data_type: text
            data_tests:
              - not_null

          - name: pool_id
            description: "Foreign key to Pool table"
            data_type: text
            data_tests:
              - not_null

          - name: sender
            description: "Address that initiated the swap"
            data_type: text
            data_tests:
              - not_null

          - name: recipient
            description: "Address that received the swap output"
            data_type: text
            data_tests:
              - not_null

          - name: txFrom
            description: "Address initiated the transaction"
            data_type: text
            data_tests:
              - not_null

          - name: amount0
            description: "Amount of token0 (can be negative, raw BigInt)"
            data_type: numeric
            data_tests:
              - not_null

          - name: amount1
            description: "Amount of token1 (can be negative, raw BigInt)"
            data_type: numeric
            data_tests:
              - not_null

          - name: sqrtPriceX96
            quote: true
            description: "Square root price after swap in Q64.96 format"
            data_type: numeric
            data_tests:
              - not_null

          - name: tick
            description: "Current tick after the swap"
            data_type: integer
            data_tests:
              - not_null

          - name: transaction_id
            quote: true
            description: "Transaction hash of the swap"
            data_type: text
            data_tests:
              - not_null

          - name: timestamp
            description: "Block timestamp of the swap"
            data_type: numeric
            data_tests:
              - not_null

          - name: gasPrice
            quote: true
            description: "Gas price of the swap"
            data_type: numeric
            data_tests:
              - not_null

          - name: amountUSD
            quote: true
            description: "USD value of the swap"
            data_type: numeric
            data_tests:
              - not_null

      - name: Token
        identifier: Token
        columns:
          - name: id
            description: "id of the token"
            data_type: text
            data_tests:
              - not_null
              - unique

          - name: decimals
            description: "Number of decimals of the token"
            data_type: integer
            data_tests:
              - not_null

          - name: symbol
            description: "Symbol of the token"
            data_type: text
            data_tests:
              - not_null

          - name: name
            description: "Name of the token"
            data_type: text
            data_tests:
              - not_null

      - name: Pool
        identifier: Pool
        columns:
          - name: id
            description: "Address of the pool"
            data_type: text
            data_tests:
              - not_null
              - unique

          - name: dex
            description: "DEX identifier"
            data_type: text
            data_tests:
              - not_null

          - name: feeTier
            description: "Fee tier of the pool (in hundredths of a bip)"
            data_type: numeric
