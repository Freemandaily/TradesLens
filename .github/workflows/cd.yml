name: dbt CD

on:
  push:
    branches:
      - main
    paths:
      - "Dex-model/**"
      - ".github/workflows/cd.yml"
  schedule:
    - cron: "0 * * * *"

jobs:
  dbt-cd:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Dex-model

    env:
      DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
      DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
      DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
      DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
      DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt
        run: pip install dbt-postgres dbt-core

      - name: Install dbt packages
        run: dbt deps

      - name: dbt debug
        run: dbt debug --target prod

      - name: dbt run
        run: dbt run --target prod

      - name: Notify on failure
        if: failure()
        run: echo "dbt CD failed — check logs"
