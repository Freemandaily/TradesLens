name: dbt CD

on:
  push:
    branches:
      - main
    paths:
      - "Dex-model/**"
      - ".github/workflows/cd.yml"

  schedule:
    - cron: "0 * * * *"

jobs:
  dbt-cd:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Dex-model

    env:
      DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
      DBT_PG_PORT: ${{ secrets.DBT_PG_PORT }}
      DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
      DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
      DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt
        run: pip install dbt-postgres dbt-core

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          Dex:
            target: prod
            outputs:
              prod:
                type: postgres
                host: "$DBT_PG_HOST"
                port: "$DBT_PG_PORT"
                user: "$DBT_PG_USER"
                password: "$DBT_PG_PASSWORD"
                dbname: "$DBT_PG_DATABASE"
                schema: envio
                threads: 4
          EOF

      - name: Debug profiles.yml
        run: cat ~/.dbt/profiles.yml

      - name: Install dbt packages
        run: dbt deps

      - name: dbt run
        run: dbt run --target prod
