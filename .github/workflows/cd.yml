name: dbt CD - Secret Debug

on:
  push:
    branches:
      - main

jobs:
  debug-secrets:
    name: Debug Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets are being read
        run: |
          echo "HOST is set: ${{ secrets.DBT_PG_HOST != '' }}"
          echo "USER is set: ${{ secrets.DBT_PG_USER != '' }}"
          echo "PASSWORD is set: ${{ secrets.DBT_PG_PASSWORD != '' }}"
          echo "DATABASE is set: ${{ secrets.DBT_PG_DATABASE != '' }}"

      - name: Print masked secret values
        env:
          DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
          DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
          DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
          DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}
        run: |
          echo "HOST:${DBT_PG_HOST}"
          echo "USER: ${DBT_PG_USER}"
          echo "PASSWORD: ${DBT_PG_PASSWORD}"
          echo "DATABASE: ${DBT_PG_DATABASE}"
