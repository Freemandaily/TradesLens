name: dbt CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "Dex-model/**"
      - ".github/workflows/ci.yml"

jobs:
  dbt-ci:
    name: dbt compile and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Dex-model

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt
        run: pip install dbt-postgres dbt-core

      - name: Create profiles.yml
        env:
          DBT_PG_HOST: ${{ secrets.DBT_PG_HOST }}
          DBT_PG_USER: ${{ secrets.DBT_PG_USER }}
          DBT_PG_PASSWORD: ${{ secrets.DBT_PG_PASSWORD }}
          DBT_PG_DATABASE: ${{ secrets.DBT_PG_DATABASE }}
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          Dex:
            target: ci
            outputs:
              ci:
                type: postgres
                host: "${DBT_PG_HOST}"
                port: 32570
                user: "${DBT_PG_USER}"
                password: "${DBT_PG_PASSWORD}"
                dbname: "${DBT_PG_DATABASE}"
                schema: envio_ci
                threads: 4
                sslmode: require
          EOF
      - name: Debug profiles.yml
        run: cat ~/.dbt/profiles.yml

      - name: Install dbt packages
        run: dbt deps

      - name: dbt compile
        run: dbt compile --target ci

      - name: dbt run all models
        run: dbt run --target ci

      - name: Drop CI schema after run
        run: |
          PGPASSWORD=${{ secrets.DBT_PG_PASSWORD }} psql \
            -h ${{ secrets.DBT_PG_HOST }} \
            -p ${{ secrets.DBT_PG_PORT }} \
            -U ${{ secrets.DBT_PG_USER }} \
            -d ${{ secrets.DBT_PG_DATABASE }} \
            -c "DROP SCHEMA IF EXISTS envio_ci CASCADE;"
